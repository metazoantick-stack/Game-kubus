<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Box Runner</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#87CEEB;
}
canvas{
    display:block;
    margin:auto;
    background:white;
}
</style>
</head>
<body>

<canvas id="game" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x:50,
    y:220,
    w:30,
    h:30,
    vy:0,
    jump:false
};

let gravity = 0.8;
let obstacles = [];
let score = 0;

function spawn(){
    obstacles.push({
        x:800,
        y:220,
        w:20,
        h:30
    });
}

setInterval(spawn,1500);

function jump(){
    if(!player.jump){
        player.vy = -14;
        player.jump = true;
    }
}

// Keyboard
document.addEventListener("keydown", (e) => {
    if(e.code === "Space" || e.code === "ArrowUp"){
        jump();
    }
});

// Touchscreen
canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    jump();
}, { passive: false });

// Klik mouse (opsional)
canvas.addEventListener("mousedown", jump);

function update(){

    player.vy+=gravity;
    player.y+=player.vy;

    if(player.y>=220){
        player.y=220;
        player.vy=0;
        player.jump=false;
    }

    for(let i=0;i<obstacles.length;i++){
        obstacles[i].x-=6;

        if(
            player.x<obstacles[i].x+obstacles[i].w &&
            player.x+player.w>obstacles[i].x &&
            player.y<obstacles[i].y+obstacles[i].h &&
            player.y+player.h>obstacles[i].y
        ){
            score = 0;
            player.y = 220;
            player.vy = 0;
            player.jump = false;
            obstacles = [];
        }
    }

    obstacles=obstacles.filter(o=>o.x>-30);
    score++;
}
function draw(){
    ctx.clearRect(0,0,800,300);

    // tanah
    ctx.fillStyle="black";
    ctx.fillRect(0,250,800,3);

    // pemain
    ctx.fillStyle="blue";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    // rintangan
    ctx.fillStyle="green";
    obstacles.forEach(o=>{
        ctx.fillRect(o.x,o.y,o.w,o.h);
    });

    // skor
    ctx.fillStyle="black";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,650,30);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
